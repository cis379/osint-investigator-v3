function initGraph() {
    allNodes = graphData.nodes;
    allEdges = graphData.edges;

    // Stats bar
    document.getElementById('stats-bar').innerHTML = `
        <span class="stat"><b>${graphData.stats.total_tools}</b> Tools</span>
        <span class="stat"><b>${graphData.stats.selector_types}</b> Selector Types</span>
        <span class="stat"><b>${graphData.stats.tool_categories}</b> Categories</span>
        <span class="stat"><b>${graphData.stats.total_edges}</b> Connections</span>
    `;

    nodes = new vis.DataSet(allNodes);
    edges = new vis.DataSet(allEdges);

    const container = document.getElementById('graph');
    container.innerHTML = '';
    network = new vis.Network(container, { nodes, edges }, {
        physics: {
            forceAtlas2Based: { gravitationalConstant: -120, centralGravity: 0.003, springLength: 200, springConstant: 0.04, damping: 0.4 },
            solver: 'forceAtlas2Based',
            stabilization: { iterations: 250, updateInterval: 25 },
        },
        interaction: { hover: true, tooltipDelay: 150, zoomView: true, dragView: true, navigationButtons: true },
        edges: { font: { size: 8, color: '#8b949e', strokeWidth: 0 }, smooth: { type: 'continuous' } },
        nodes: { font: { color: '#c9d1d9', size: 11 }, borderWidth: 2 },
    });

    // Legend
    const legendEl = document.getElementById('legend');
    const cats = {};
    allNodes.filter(n => n.nodeKind === 'selector').forEach(n => {
        const c = n.category || 'unknown';
        if (!cats[c]) cats[c] = { color: n.color, count: 0 };
        cats[c].count++;
    });
    Object.entries(cats).sort((a,b) => b[1].count - a[1].count).forEach(([cat, info]) => {
        const color = typeof info.color === 'string' ? info.color : info.color?.background || '#9E9E9E';
        legendEl.innerHTML += `<div class="legend-item" data-cat="${cat}"><div class="legend-dot" style="background:${color}"></div>${cat} (${info.count})</div>`;
    });
    legendEl.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:#21262d; border:1px solid #58a6ff"></div>Tool/Category</div>`;

    // Click details
    network.on('click', params => {
        const detailsEl = document.getElementById('details');
        if (params.nodes.length === 0) { detailsEl.innerHTML = '<h2>Details</h2><p style="font-size:11px;color:#8b949e;">Click any node</p>'; return; }
        const nodeId = params.nodes[0];
        const node = allNodes.find(n => n.id === nodeId);
        if (!node) return;

        if (node.nodeKind === 'selector') {
            const pm = graphData.pivot_map[node.selectorType] || {};
            const toolIds = pm.tools || [];
            const yields = pm.yields || [];
            const toolCatLookup = graphData.tool_categories || {};

            // Find tool names from categories
            let toolNames = [];
            for (const [cat, catData] of Object.entries(toolCatLookup)) {
                for (const tName of (catData.tools || [])) {
                    toolNames.push({name: tName, category: cat});
                }
            }

            detailsEl.innerHTML = `
                <h2>Selector: ${node.selectorType}</h2>
                <div class="info-block"><div class="label">Description</div>${node.title?.replace(/\\n/g, '<br>') || node.selectorType}</div>
                <div class="info-block"><div class="label">Tools (${pm.tool_count || 0})</div>${pm.tool_count || 0} tools accept this selector type</div>
                <h3>Yields (pivots to):</h3>
                <div>${yields.map(y => '<span class="tag tag-output">'+y+'</span>').join('') || '<span style="color:#8b949e">None</span>'}</div>
            `;
        } else {
            const title = (node.title || '').replace(/\\n/g, '<br>');
            detailsEl.innerHTML = `
                <h2>${node.label}</h2>
                <div class="info-block"><div class="label">Category</div>${node.category || 'unknown'}</div>
                <div class="info-block">${title}</div>
            `;
        }
    });

    // Search
    document.getElementById('search').addEventListener('input', e => {
        const q = e.target.value.toLowerCase();
        if (!q) { nodes.update(allNodes.map(n => ({id: n.id, hidden: false}))); return; }
        nodes.update(allNodes.map(n => ({
            id: n.id,
            hidden: !(
                (n.label || '').toLowerCase().includes(q) ||
                (n.selectorType || '').toLowerCase().includes(q) ||
                (n.category || '').toLowerCase().includes(q) ||
                (n.title || '').toLowerCase().includes(q)
            )
        })));
    });

    // Mode toggle
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const mode = btn.dataset.mode;

            nodes.update(allNodes.map(n => {
                let hidden = false;
                if (mode === 'selectors') hidden = n.nodeKind !== 'selector';
                else if (mode === 'tools') hidden = n.nodeKind === 'selector';
                else if (mode !== 'full') hidden = n.nodeKind === 'selector' && n.category !== mode;
                return {id: n.id, hidden};
            }));
        });
    });

    // Legend click to filter
    document.querySelectorAll('.legend-item[data-cat]').forEach(item => {
        item.addEventListener('click', () => {
            const cat = item.dataset.cat;
            nodes.update(allNodes.map(n => ({
                id: n.id,
                hidden: n.nodeKind === 'selector' && n.category !== cat
            })));
        });
    });
}
