<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <!-- Arrowhead markers -->
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#555">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563eb">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#16a34a">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#ea580c">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#7c3aed">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <!-- Drop shadow -->
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="white"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="900" height="44" rx="0" fill="#1a1a2e"/>
  <text x="450" y="28" text-anchor="middle" fill="white" font-size="16" font-weight="bold">OV-1: OSINT Investigation System -- High-Level Operational Concept</text>

  <!-- DoDAF label -->
  <text x="880" y="62" text-anchor="end" fill="#999" font-size="9">DoDAF v2.02 / OV-1</text>

  <!-- ============================================ -->
  <!-- USER / ANALYST (blue zone) -->
  <!-- ============================================ -->
  <rect x="310" y="60" width="280" height="72" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="310" y="60" width="280" height="24" rx="10" fill="#2563eb"/>
  <rect x="310" y="74" width="280" height="10" fill="#2563eb"/>
  <text x="450" y="77" text-anchor="middle" fill="white" font-size="11" font-weight="bold">USER / ANALYST</text>
  <text x="450" y="100" text-anchor="middle" fill="#1e40af" font-size="10">Provides seed selectors (username, email,</text>
  <text x="450" y="113" text-anchor="middle" fill="#1e40af" font-size="10">IP, domain, phone, wallet, hash, URL...)</text>
  <text x="450" y="126" text-anchor="middle" fill="#1e40af" font-size="9" font-style="italic">Redirects, injects seeds, asks questions</text>

  <!-- ============================================ -->
  <!-- SUPERVISOR AGENT (green zone, center) -->
  <!-- ============================================ -->
  <rect x="275" y="195" width="350" height="108" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <rect x="275" y="195" width="350" height="26" rx="12" fill="#16a34a"/>
  <rect x="275" y="211" width="350" height="10" fill="#16a34a"/>
  <text x="450" y="215" text-anchor="middle" fill="white" font-size="12" font-weight="bold">SUPERVISOR AGENT</text>
  <text x="450" y="240" text-anchor="middle" fill="#166534" font-size="10" font-weight="600">Conversational  |  Main Thread  |  The Brain</text>
  <text x="295" y="258" fill="#166534" font-size="9">1. Auto-detects selector type (regex)</text>
  <text x="295" y="271" fill="#166534" font-size="9">2. Queries ontology for applicable tools</text>
  <text x="295" y="284" fill="#166534" font-size="9">3. Plans investigation, dispatches gatherers</text>
  <text x="295" y="297" fill="#166534" font-size="9">4. Analyzes results, identifies connections &amp; patterns</text>

  <!-- ============================================ -->
  <!-- ONTOLOGY (reference DB, right of supervisor) -->
  <!-- ============================================ -->
  <rect x="680" y="195" width="190" height="75" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="680" y="195" width="190" height="22" rx="8" fill="#ca8a04"/>
  <rect x="680" y="209" width="190" height="8" fill="#ca8a04"/>
  <text x="775" y="212" text-anchor="middle" fill="white" font-size="10" font-weight="bold">ONTOLOGY</text>
  <text x="775" y="233" text-anchor="middle" fill="#854d0e" font-size="9" font-weight="600">pivot_map.json</text>
  <text x="775" y="247" text-anchor="middle" fill="#854d0e" font-size="9">1,031 tools catalogued</text>
  <text x="775" y="261" text-anchor="middle" fill="#854d0e" font-size="9">~20 automated integrations</text>

  <!-- Arrow: Supervisor <-> Ontology -->
  <line x1="625" y1="235" x2="675" y2="235" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="675" y1="245" x2="625" y2="245" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="650" y="229" text-anchor="middle" fill="#ca8a04" font-size="7">lookup</text>

  <!-- ============================================ -->
  <!-- GATHERER AGENTS (orange zone, below center) -->
  <!-- ============================================ -->
  <!-- Gatherer 1 -->
  <rect x="160" y="365" width="130" height="60" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="160" y="365" width="130" height="20" rx="8" fill="#ea580c"/>
  <rect x="160" y="378" width="130" height="7" fill="#ea580c"/>
  <text x="225" y="381" text-anchor="middle" fill="white" font-size="9" font-weight="bold">GATHERER 1</text>
  <text x="225" y="400" text-anchor="middle" fill="#9a3412" font-size="8">Background thread</text>
  <text x="225" y="412" text-anchor="middle" fill="#9a3412" font-size="8">API calls</text>

  <!-- Gatherer 2 -->
  <rect x="310" y="365" width="130" height="60" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="310" y="365" width="130" height="20" rx="8" fill="#ea580c"/>
  <rect x="310" y="378" width="130" height="7" fill="#ea580c"/>
  <text x="375" y="381" text-anchor="middle" fill="white" font-size="9" font-weight="bold">GATHERER 2</text>
  <text x="375" y="400" text-anchor="middle" fill="#9a3412" font-size="8">Background thread</text>
  <text x="375" y="412" text-anchor="middle" fill="#9a3412" font-size="8">CLI tools</text>

  <!-- Gatherer 3 -->
  <rect x="460" y="365" width="130" height="60" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="460" y="365" width="130" height="20" rx="8" fill="#ea580c"/>
  <rect x="460" y="378" width="130" height="7" fill="#ea580c"/>
  <text x="525" y="381" text-anchor="middle" fill="white" font-size="9" font-weight="bold">GATHERER 3</text>
  <text x="525" y="400" text-anchor="middle" fill="#9a3412" font-size="8">Background thread</text>
  <text x="525" y="412" text-anchor="middle" fill="#9a3412" font-size="8">Web scraping</text>

  <!-- Gatherer N (dotted) -->
  <rect x="610" y="365" width="100" height="60" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="5,3" filter="url(#shadow)"/>
  <text x="660" y="398" text-anchor="middle" fill="#ea580c" font-size="10" font-weight="bold">...</text>
  <text x="660" y="415" text-anchor="middle" fill="#9a3412" font-size="8">Gatherer N</text>

  <!-- Label for gatherer zone -->
  <text x="425" y="355" text-anchor="middle" fill="#ea580c" font-size="9" font-weight="bold" font-style="italic">Dumb Data Fetchers (parallel background agents)</text>

  <!-- ============================================ -->
  <!-- OSINT DATA SOURCES (right side) -->
  <!-- ============================================ -->
  <rect x="730" y="330" width="150" height="160" rx="8" fill="#fdf2f8" stroke="#be185d" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="730" y="330" width="150" height="22" rx="8" fill="#be185d"/>
  <rect x="730" y="345" width="150" height="7" fill="#be185d"/>
  <text x="805" y="348" text-anchor="middle" fill="white" font-size="10" font-weight="bold">OSINT SOURCES</text>
  <text x="748" y="370" fill="#9d174d" font-size="9">Shodan, Censys, HIBP</text>
  <text x="748" y="384" fill="#9d174d" font-size="9">VirusTotal, AbuseIPDB</text>
  <text x="748" y="398" fill="#9d174d" font-size="9">Sherlock, Holehe, GHunt</text>
  <text x="748" y="412" fill="#9d174d" font-size="9">whois, dig, nmap</text>
  <text x="748" y="426" fill="#9d174d" font-size="9">Social media APIs</text>
  <text x="748" y="440" fill="#9d174d" font-size="9">Blockchain explorers</text>
  <text x="748" y="454" fill="#9d174d" font-size="9">Paste sites, archives</text>
  <text x="748" y="468" fill="#9d174d" font-size="9">DNS, certificate logs</text>
  <text x="748" y="482" fill="#9d174d" font-size="9">Search engines, EXIF</text>

  <!-- ============================================ -->
  <!-- OUTPUTS (left side, purple zone) -->
  <!-- ============================================ -->
  <rect x="20" y="195" width="200" height="192" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="20" y="195" width="200" height="22" rx="8" fill="#7c3aed"/>
  <rect x="20" y="210" width="200" height="7" fill="#7c3aed"/>
  <text x="120" y="213" text-anchor="middle" fill="white" font-size="10" font-weight="bold">OUTPUTS</text>

  <!-- Output items -->
  <rect x="35" y="228" width="170" height="28" rx="6" fill="white" stroke="#a78bfa" stroke-width="1"/>
  <text x="120" y="246" text-anchor="middle" fill="#5b21b6" font-size="9" font-weight="600">NetworkX Graph DB</text>

  <rect x="35" y="262" width="170" height="28" rx="6" fill="white" stroke="#a78bfa" stroke-width="1"/>
  <text x="120" y="280" text-anchor="middle" fill="#5b21b6" font-size="9" font-weight="600">Interactive vis.js Graph</text>

  <rect x="35" y="296" width="170" height="28" rx="6" fill="white" stroke="#a78bfa" stroke-width="1"/>
  <text x="120" y="314" text-anchor="middle" fill="#5b21b6" font-size="9" font-weight="600">Investigation Log (MD)</text>

  <rect x="35" y="330" width="170" height="28" rx="6" fill="white" stroke="#a78bfa" stroke-width="1"/>
  <text x="120" y="348" text-anchor="middle" fill="#5b21b6" font-size="9" font-weight="600">Clickable Bibliography</text>

  <!-- ============================================ -->
  <!-- REPORT WRITER (bottom center, purple) -->
  <!-- ============================================ -->
  <rect x="200" y="490" width="250" height="60" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="200" y="490" width="250" height="22" rx="10" fill="#7c3aed"/>
  <rect x="200" y="504" width="250" height="8" fill="#7c3aed"/>
  <text x="325" y="508" text-anchor="middle" fill="white" font-size="10" font-weight="bold">REPORT WRITER AGENT</text>
  <text x="325" y="530" text-anchor="middle" fill="#5b21b6" font-size="9">Produces CTI Report</text>
  <text x="325" y="543" text-anchor="middle" fill="#5b21b6" font-size="9">(Markdown + Professional HTML)</text>

  <!-- ============================================ -->
  <!-- FINAL REPORT OUTPUT (bottom) -->
  <!-- ============================================ -->
  <rect x="265" y="590" width="170" height="42" rx="8" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="350" y="612" text-anchor="middle" fill="white" font-size="10" font-weight="bold">CTI REPORT</text>
  <text x="350" y="625" text-anchor="middle" fill="#e9d5ff" font-size="8">MD + HTML + Artifacts</text>

  <!-- ============================================ -->
  <!-- DATA FLOW ARROWS -->
  <!-- ============================================ -->

  <!-- User -> Supervisor (seeds + questions) -->
  <line x1="450" y1="132" x2="450" y2="192" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="458" y="165" fill="#2563eb" font-size="8" font-weight="600">seeds / questions</text>

  <!-- Supervisor -> User (analysis + prompts) -->
  <line x1="420" y1="192" x2="420" y2="135" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="356" y="165" fill="#16a34a" font-size="8" font-weight="600">analysis</text>

  <!-- Supervisor -> Gatherers (dispatch) -->
  <line x1="370" y1="303" x2="225" y2="362" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="425" y1="303" x2="375" y2="362" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="480" y1="303" x2="525" y2="362" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="450" y="335" text-anchor="middle" fill="#ea580c" font-size="8" font-weight="600">dispatch tasks</text>

  <!-- Gatherers -> Supervisor (raw data return) -->
  <line x1="240" y1="365" x2="360" y2="305" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-green)"/>
  <line x1="390" y1="365" x2="420" y2="305" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-green)"/>
  <line x1="510" y1="365" x2="475" y2="305" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-green)"/>
  <text x="530" y="338" fill="#16a34a" font-size="7" font-style="italic">raw data</text>

  <!-- Gatherers -> OSINT Sources -->
  <line x1="660" y1="395" x2="727" y2="395" stroke="#be185d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="727" y1="410" x2="660" y2="410" stroke="#be185d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="693" y="388" fill="#be185d" font-size="7">query</text>
  <text x="693" y="426" fill="#be185d" font-size="7">results</text>

  <!-- Supervisor -> Outputs -->
  <line x1="275" y1="250" x2="223" y2="250" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <line x1="275" y1="275" x2="223" y2="275" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <line x1="275" y1="290" x2="223" y2="310" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <line x1="275" y1="298" x2="223" y2="344" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Outputs -> Report Writer -->
  <line x1="120" y1="387" x2="120" y2="515" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="120" y1="515" x2="197" y2="515" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-purple)"/>
  <text x="130" y="460" fill="#7c3aed" font-size="7" font-style="italic">feeds into</text>

  <!-- Supervisor -> Report Writer -->
  <line x1="400" y1="303" x2="350" y2="487" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="395" y="440" fill="#7c3aed" font-size="7">trigger report</text>

  <!-- Report Writer -> Final Report -->
  <line x1="325" y1="550" x2="340" y2="587" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- ============================================ -->
  <!-- LEGEND -->
  <!-- ============================================ -->
  <rect x="20" y="560" width="170" height="120" rx="6" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <text x="105" y="578" text-anchor="middle" fill="#1a1a2e" font-size="9" font-weight="bold">LEGEND</text>
  <rect x="30" y="586" width="12" height="12" rx="2" fill="#2563eb"/>
  <text x="48" y="596" fill="#333" font-size="8">User Interaction</text>
  <rect x="30" y="604" width="12" height="12" rx="2" fill="#16a34a"/>
  <text x="48" y="614" fill="#333" font-size="8">Analysis / Supervisor</text>
  <rect x="30" y="622" width="12" height="12" rx="2" fill="#ea580c"/>
  <text x="48" y="632" fill="#333" font-size="8">Data Collection</text>
  <rect x="30" y="640" width="12" height="12" rx="2" fill="#7c3aed"/>
  <text x="48" y="650" fill="#333" font-size="8">Outputs / Reporting</text>
  <rect x="30" y="658" width="12" height="12" rx="2" fill="#ca8a04"/>
  <text x="48" y="668" fill="#333" font-size="8">Ontology / Reference</text>

  <!-- Classification marking (decorative) -->
  <text x="450" y="695" text-anchor="middle" fill="#aaa" font-size="8">UNCLASSIFIED // OSINT Investigation System // OV-1</text>
</svg>